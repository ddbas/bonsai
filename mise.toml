[hooks]
enter = "lefthook install"

[tasks.build]
description = "Build the cargo project"
run = "rtk cargo build"
sources = ["Cargo.toml", "src/**/*.rs"]
outputs = ["target/debug/bs"]

[tasks."build:release"]
description = "Build the cargo project in release mode"
run = "rtk cargo build --release"
sources = ["Cargo.toml", "src/**/*.rs"]
outputs = ["target/release/bs"]

[tasks.run]
description = "Run the cargo project"
run = "cargo run"

[tasks.test]
description = "Run the cargo test suite"
run = "rtk cargo test"

[tasks."openspec:open"]
description = "Render an OpenSpec proposal to HTML and open it in the browser"
usage = '''
arg "<change-id>" help="OpenSpec change ID to preview (e.g. my-feature)"
complete "change-id" run="openspec list --json | jq -r '.changes[].name'"
'''
run = "scripts/view-proposal.sh ${usage_change_id?}"

[tools]
lefthook = "latest"
"github:rtk-ai/rtk" = "latest"
"npm:@colbymchenry/codegraph" = "latest"
"npm:@fission-ai/openspec" = "latest"
pandoc = "latest"
prettier = "latest"
rust = "1.96.0"
